<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Cybersecurity Threat Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>AI Cybersecurity Threat Analyzer</h1>

    <select id="duration">
        <option>Duration</option>
        <option>Short</option>
        <option>Medium</option>
        <option>Long</option>
    </select>

    <input type="number" id="protocol" placeholder="Protocol (0=tcp, 1=udp)">
    <input type="number" id="packets" placeholder="Packets">

    <button id="analyzeBtn">Analyze</button>

    <div id="outputBox" class="output hidden"></div>
</div>

<!-- Popup -->
<div id="popup" class="popup hidden">
    <div class="popup-content">
        <h2>Threat Result</h2>
        <p id="popupText"></p>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<script>
document.getElementById("analyzeBtn").addEventListener("click", analyze);

function analyze() {
    let packets = parseInt(document.getElementById("packets").value);

    if (isNaN(packets)) {
        alert("Please enter packets value");
        return;
    }

    let result = "";
    let outputBox = document.getElementById("outputBox");

    if (packets > 1000) {
        result = "⚠️ High Threat Detected";
        outputBox.style.background = "#ff4b2b";
    } else {
        result = "✅ Safe Traffic";
        outputBox.style.background = "#28a745";
    }

    outputBox.innerText = result;
    outputBox.classList.remove("hidden");

    document.getElementById("popupText").innerText = result;
    document.getElementById("popup").classList.remove("hidden");
}

function closePopup() {
    document.getElementById("popup").classList.add("hidden");
}
</script>

</body>
</html>
